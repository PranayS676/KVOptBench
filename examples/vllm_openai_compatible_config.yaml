experiment_id: vllm_real_endpoint_smoke
official_run: false
provider: local
engine: vllm
endpoint_type: vllm
model_id: replace-with-your-served-model
strategy: baseline
base_url: http://127.0.0.1:8000/v1
healthcheck_path: /v1/models
api_key_env: null
workload_file: workloads/generated/shared_prefix_32k.jsonl
output_file: results/raw/vllm_real_endpoint_smoke.jsonl
concurrency: 1
request_rate: null
max_tasks: 5
max_output_tokens: 256
timeout_seconds: 120
request_timeout_seconds: 120
retries: 2
retry_backoff_seconds: 0.5
capture_response_headers: true
stream: true
telemetry:
  enabled: false
  output_dir: results/telemetry
  prometheus:
    - name: vllm
      url: http://127.0.0.1:8000/metrics
      timeout_seconds: 2
      scrape_phases: [before_run, during_run, after_run]
      scrape_interval_seconds: 1
      expected_metrics:
        - engine_reported_cache_hit_rate
      metric_aliases:
        vllm:prefix_cache_hit_rate: engine_reported_cache_hit_rate
  gpu:
    enabled: true
    provider: nvidia_smi
    sample_interval_seconds: 1
  lmcache:
    - name: lmcache
      url: http://127.0.0.1:9000/metrics
      format: prometheus
      expected_metrics:
        - lmcache_cache_hit_rate
endpoint_metadata:
  note: Existing vLLM OpenAI-compatible endpoint. KVOptBench does not start the server.
metadata:
  description: Public-safe real endpoint smoke config for an already running vLLM server.
